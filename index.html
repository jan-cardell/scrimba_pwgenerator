<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Karla:ital,wght@0,200..800;1,200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="header">
            <h1 id="header_1">Generate a</h1>
            <h1 id="header_2">random password</h1>
        </div>
        <p id="subtitle">Never use an insecure password again.<p>
        <button id="generate_btn" onclick="generatePasswords()">Generate passwords</button>
        <input type="number" id="lengthInput" placeholder="Choose Length">
        <div>
            <input type="checkbox" id="number" checked>
            <label for="number">Include Numbers</label>
        </div> 
        <div>
            <input type="checkbox" id="special" checked>
            <label for="special">Include Special Characters</label>
        </div> 
        <p id="sep"></p>
        <div id="password_output">
            <div class="singleOutput">
                <p class="output_fields" id="output1-el"></p>
                <button class="copyBtn" id="copyBtn1" onclick="copytoclip1()">⧉</button>
            </div>
            <div class="singleOutput">
                <p class="output_fields" id="output2-el"></p>
                <button class="copyBtn" id="copyBtn2" onclick="copytoclip2()">⧉</button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
